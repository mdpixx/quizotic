name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Advisory only: main currently has pre-existing eslint errors. This step
      # surfaces lint issues without blocking merges. Once the backlog is cleared,
      # remove `continue-on-error` to make lint a hard gate. See docs/RELEASING.md.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Verify generated brand assets
        run: npm run brand:assets:check

      - name: Run unit and regression tests
        run: npm test

      - name: Build production application
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
        run: npm run build
