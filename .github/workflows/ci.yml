name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Hard gate since July 2026 — the error backlog was cleared (0 errors).
      # Warnings do not fail the build; errors do. See docs/RELEASING.md.
      - name: Lint
        run: npm run lint

      - name: Verify generated brand assets
        run: npm run brand:assets:check

      - name: Run unit and regression tests
        run: npm test

      - name: Build production application
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build
        run: npm run build
